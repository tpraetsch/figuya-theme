# figuya (dark) — generated by generate.py.
[main]
font=JetBrainsMono Nerd Font:size=11
prompt=Search
icon-theme=Adwaita
icons-enabled=yes
terminal=foot -e
layer=overlay
width=35
lines=12
# The selection bar is always full-width (border to border); horizontal-pad
# insets the row *text* within it. So padding the items and a full-width
# selection are not in conflict — keep a comfortable text inset here.
horizontal-pad=16
vertical-pad=10
inner-pad=8
line-height=28
match-mode=fuzzy

[border]
width=3
radius=12

[colors]
background=251d1bff
text=f5ece0ff
prompt=a1887fff
placeholder=a1887fff
input=f5ece0ff
match=f14747ff
selection=f76707ff
selection-text=251d1bff
selection-match=251d1bff
counter=a1887fff
border=f5ece0ff
