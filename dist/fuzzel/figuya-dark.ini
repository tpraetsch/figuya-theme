# figuya (dark) — generated by generate.py.
[main]
font=JetBrainsMono Nerd Font:size=11
prompt=󰍉  
icon-theme=Adwaita
icons-enabled=yes
terminal=foot -e
layer=overlay
width=35
lines=12
# horizontal-pad insets all content INCLUDING the selection bar (fuzzel has no
# separate row padding), so a non-zero pad reads as a base-bg gutter beside the
# selected row. Kept at 16 for legible text. inner-pad is the search-row→list gap;
# widened so the search field reads as its own zone above the results.
horizontal-pad=16
vertical-pad=12
inner-pad=14
line-height=28
match-mode=fuzzy

[border]
width=3
radius=12

[colors]
background=251d1bff
text=f5ece0ff
prompt=f76a0bff
placeholder=ad9890ff
input=f5ece0ff
match=f36868ff
selection=f76707ff
selection-text=251d1bff
selection-match=251d1bff
counter=ad9890ff
border=f5ece0ff
