# figuya (light) — generated by generate.py.
[main]
font=JetBrainsMono Nerd Font:size=11
prompt=󰍉  
icon-theme=Adwaita
icons-enabled=yes
terminal=foot -e
layer=overlay
width=35
lines=12
# horizontal-pad insets all content INCLUDING the selection bar (fuzzel has no
# separate row padding), so a non-zero pad reads as a base-bg gutter beside the
# selected row. Kept at 16 for legible text. inner-pad is the search-row→list gap;
# widened so the search field reads as its own zone above the results.
horizontal-pad=16
vertical-pad=12
inner-pad=14
line-height=28
match-mode=fuzzy

[border]
width=3
radius=12

[colors]
background=fff6e9ff
text=2d2220ff
prompt=a94605ff
placeholder=5c4d4aff
input=2d2220ff
match=ba3030ff
selection=a94605ff
selection-text=fff6e9ff
selection-match=fff6e9ff
counter=5c4d4aff
border=2d2220ff
