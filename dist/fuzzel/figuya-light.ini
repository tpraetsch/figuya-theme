# figuya (light) — generated by generate.py.
[main]
font=JetBrainsMono Nerd Font:size=11
prompt=Search
icon-theme=Adwaita
icons-enabled=yes
terminal=foot -e
layer=overlay
width=35
lines=12
# The selection bar is always full-width (border to border); horizontal-pad
# insets the row *text* within it. So padding the items and a full-width
# selection are not in conflict — keep a comfortable text inset here.
horizontal-pad=16
vertical-pad=10
inner-pad=8
line-height=28
match-mode=fuzzy

[border]
width=3
radius=12

[colors]
background=fff6e9ff
text=2d2220ff
prompt=5c4d4aff
placeholder=5c4d4aff
input=2d2220ff
match=d33636ff
selection=bf4f05ff
selection-text=fff6e9ff
selection-match=fff6e9ff
counter=5c4d4aff
border=2d2220ff
