# figuya (dark) — generated. Minimal hairline borders;
# focus is shown by window opacity, so both states share a quiet tone.
$activeBorder   = rgba(50403dff)
$inactiveBorder = rgba(50403d99)
# Groupbar (tabbed stacks): brand-accent active tab, recessed inactive.
# Consume in group:groupbar — col.active/inactive + text_color[_inactive].
$groupActive       = rgba(f76707ff)
$groupInactive     = rgba(3b2f31ff)
$groupText         = rgba(2d2220ff)
$groupTextInactive = rgba(ab958cff)
