# figuya — generated by generate.py from palette.toml. Do not hand-edit.
# tmux figuya (dark) — source from tmux.conf:  source-file <path>
set -g mode-style "fg=#f5ece0,bg=#50403d"
set -g message-style "fg=#f5ece0,bg=#2e2422"
set -g message-command-style "fg=#f5ece0,bg=#2e2422"
set -g pane-border-style "fg=#3b2f31"
set -g pane-active-border-style "fg=#f76707"
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#f5ece0,bg=#2e2422"
set -g status-left "#[fg=#2d2220,bg=#f76707,bold] #S #[fg=#f76707,bg=#2e2422,nobold]"
set -g status-right "#[fg=#ad9890] %Y-%m-%d #[fg=#4c9adf]%H:%M "
setw -g window-status-format "#[fg=#ad9890,bg=#2e2422] #I #W "
setw -g window-status-current-format "#[fg=#2d2220,bg=#f76707,bold] #I #W "
setw -g window-status-separator ""
