# figuya — generated by generate.py from palette.toml. Do not hand-edit.
# tmux figuya (light) — source from tmux.conf:  source-file <path>
set -g mode-style "fg=#2d2220,bg=#e8ddca"
set -g message-style "fg=#2d2220,bg=#fffaf3"
set -g message-command-style "fg=#2d2220,bg=#fffaf3"
set -g pane-border-style "fg=#f6ead8"
set -g pane-active-border-style "fg=#f76707"
set -g status "on"
set -g status-justify "left"
set -g status-style "fg=#2d2220,bg=#fffaf3"
set -g status-left "#[fg=#2d2220,bg=#f76707,bold] #S #[fg=#f76707,bg=#fffaf3,nobold]"
set -g status-right "#[fg=#5c4d4a] %Y-%m-%d #[fg=#1a74c6]%H:%M "
setw -g window-status-format "#[fg=#5c4d4a,bg=#fffaf3] #I #W "
setw -g window-status-current-format "#[fg=#2d2220,bg=#f76707,bold] #I #W "
setw -g window-status-separator ""
